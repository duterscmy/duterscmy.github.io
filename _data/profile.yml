short_bio: >-
  <p>
    Hi, I am Mingyu Cao (曹明宇), a first-year PhD student in the
    School of Computer Science and Electronic Engineering
    at the <a href="https://www.surrey.ac.uk/school-computer-science-and-electronic-engineering" target="_blank">University of Surrey</a>, advised by
    <a href="https://luuyin.com/" target="_blank">Dr. Lu Yin</a>.
    My research focuses on Diffusion Language Models and Efficient LLMs.
  </p>
  <p>
    Prior to my PhD, I worked as an NLP Algorithm Engineer at several leading Chinese internet companies,
    including NetEase, ByteDance, and Shopee, where I specialised in machine translation. Outside of research, I enjoy movies, social media, and travelling.
    I am a strong advocate for work–life balance and remote work.
  </p>

